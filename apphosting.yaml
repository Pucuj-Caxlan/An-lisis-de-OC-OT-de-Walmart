
# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Aumentamos recursos para manejar la carga de IA y procesamiento de archivos
  cpu: 1
  memoryMiB: 1024
  maxInstances: 10
  minInstances: 0

env:
  - variable: NODE_ENV
    value: production
